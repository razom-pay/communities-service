version: '3.9'

services:
    community-service:
        container_name: community-service
        image: razom-pay/community-service:dev
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        env_file:
            - .env.production.local
        volumes:
            - ../.logs/community:/var/log/services/community
        networks:
            - razom-pay

networks:
    razom-pay:
        external: true
